name: Release

on:
  workflow_run:
    workflows:
      - Tests
    branches:
      - main
    types:
      - completed

env:
  FLUTTER_VERSION: '3.44.4'
  JAVA_VERSION: '17'
  PUB_CACHE: ${{ github.workspace }}\.pub-cache
  GRADLE_USER_HOME: C:\gradle

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Read pubspec version
        id: version
        run: |
          $match = Select-String -Path "pubspec.yaml" -Pattern "^version:\s*([^\s#]+)" | Select-Object -First 1

          if ($null -eq $match) {
            throw "pubspec.yaml does not contain a version field."
          }

          $version = $match.Matches[0].Groups[1].Value
          $artifactVersion = $version -replace "[^A-Za-z0-9._-]", "_"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "artifact_version=$artifactVersion" >> $env:GITHUB_OUTPUT

      - name: Check release status
        id: release_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"

          function Test-ReleaseExists([string]$releaseTag) {
            gh release view $releaseTag --repo $env:GITHUB_REPOSITORY *> $null
            return $LASTEXITCODE -eq 0
          }

          function Convert-ToReleaseVersion([string]$value) {
            $clean = $value -replace "^v", ""
            $clean = ($clean -split "[+-]")[0]
            return [version]$clean
          }

          $hasCurrentRelease = (Test-ReleaseExists $tag) -or (Test-ReleaseExists $version)
          $latestTag = gh release list `
            --repo $env:GITHUB_REPOSITORY `
            --exclude-drafts `
            --limit 1 `
            --json tagName `
            --jq ".[0].tagName"

          if ($latestTag -eq "null") {
            $latestTag = ""
          }

          if ($hasCurrentRelease) {
            $shouldBuild = $false
          } elseif ([string]::IsNullOrWhiteSpace($latestTag)) {
            $shouldBuild = $true
          } else {
            $shouldBuild = (Convert-ToReleaseVersion $version).CompareTo((Convert-ToReleaseVersion $latestTag)) -gt 0
          }

          "should_build=$($shouldBuild.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if (-not $shouldBuild) {
            Write-Host "Release build skipped. Existing release: $hasCurrentRelease. Latest release tag: $latestTag. Pubspec version: $version."
          }

      - name: Extract release notes
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $found = $false
          $notes = [System.Collections.Generic.List[string]]::new()

          foreach ($line in Get-Content "CHANGELOG.md") {
            if ($line -match "^## ") {
              if ($found) {
                break
              }

              $found = $line.Trim() -eq "## $version"
              continue
            }

            if ($found) {
              $notes.Add($line)
            }
          }

          $body = ($notes -join "`n").Trim()

          if ([string]::IsNullOrWhiteSpace($body)) {
            throw "Missing CHANGELOG.md section for $version"
          }

          "$body`n`n---`nFlutter version: $env:FLUTTER_VERSION`n" | Set-Content -Path "release_notes.md" -Encoding utf8

      - name: Stop when release is not needed
        if: ${{ steps.release_info.outputs.should_build != 'true' }}
        run: Write-Host "Release is already published or pubspec version is not newer than the latest release."

      - name: Set up Java
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare cache directories
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        run: |
          New-Item -ItemType Directory -Force -Path $env:PUB_CACHE | Out-Null
          New-Item -ItemType Directory -Force -Path $env:GRADLE_USER_HOME | Out-Null

      - name: Cache Pub dependencies
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock', '**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle dependencies
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}\caches
            ${{ env.GRADLE_USER_HOME }}\wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Disable Flutter analytics
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        run: flutter config --no-analytics

      - name: Install dependencies
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        run: flutter pub get

      - name: Generate translations
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        run: dart run slang

      - name: Generate code
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Validate release secrets
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          $requiredSecrets = @(
            "KEYSTORE_BASE64",
            "KEYSTORE_PASSWORD",
            "KEY_PASSWORD",
            "KEY_ALIAS",
            "BASE_URL",
            "API_BASE_URL"
          )

          foreach ($secretName in $requiredSecrets) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($secretName))) {
              throw "$secretName secret is required."
            }
          }

      - name: Decode Android keystore
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:KEYSTORE_BASE64)) {
            throw "KEYSTORE_BASE64 secret is required."
          }

          [IO.File]::WriteAllBytes(
            "android\app\keystore.jks",
            [Convert]::FromBase64String($env:KEYSTORE_BASE64)
          )

      - name: Build Android APKs
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          flutter build apk --release --split-per-abi `
            --dart-define "BASE_URL=$env:BASE_URL" `
            --dart-define "API_BASE_URL=$env:API_BASE_URL"

      - name: Build Windows app
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          flutter build windows --release `
            --dart-define "BASE_URL=$env:BASE_URL" `
            --dart-define "API_BASE_URL=$env:API_BASE_URL"

      - name: Prepare release artifacts
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        run: |
          $version = "${{ steps.version.outputs.artifact_version }}"
          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $androidOutput = "build\app\outputs\flutter-apk"
          $apkMap = @{
            "app-arm64-v8a-release.apk" = "shinga-$version-android-arm64-v8a.apk"
            "app-armeabi-v7a-release.apk" = "shinga-$version-android-armeabi-v7a.apk"
            "app-x86_64-release.apk" = "shinga-$version-android-x86_64.apk"
          }

          foreach ($item in $apkMap.GetEnumerator()) {
            $source = Join-Path $androidOutput $item.Key
            if (!(Test-Path $source)) {
              throw "Expected Android artifact was not found: $source"
            }

            Copy-Item -Path $source -Destination (Join-Path $dist $item.Value)
          }

          $windowsOutput = "build\windows\x64\runner\Release"
          if (!(Test-Path $windowsOutput)) {
            throw "Expected Windows build output was not found: $windowsOutput"
          }

          Compress-Archive `
            -Path "$windowsOutput\*" `
            -DestinationPath (Join-Path $dist "shinga-$version-windows-x64.zip") `
            -Force

          Get-ChildItem $dist

      - name: Publish GitHub release
        if: ${{ steps.release_info.outputs.should_build == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            dist/shinga-${{ steps.version.outputs.artifact_version }}-windows-x64.zip
            dist/shinga-${{ steps.version.outputs.artifact_version }}-android-arm64-v8a.apk
            dist/shinga-${{ steps.version.outputs.artifact_version }}-android-armeabi-v7a.apk
            dist/shinga-${{ steps.version.outputs.artifact_version }}-android-x86_64.apk
