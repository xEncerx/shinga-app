name: shinga
description: "Shinga - Manga Tracker"
publish_to: "none"
version: 0.2.0

environment:
  sdk: ">=3.12.0"

# On windows, the dart analyzer throws an exception when using blob packages/*
workspace:
  - packages/storage
  - packages/ui_kit

dependencies:
  auto_route: ^11.1.0
  bloc_concurrency: ^0.3.0
  detect_proxy_setting: ^0.0.10
  dio: ^5.10.0
  dio_cache_interceptor: ^4.0.7
  dotted_border: ^3.1.0
  equatable: ^2.1.0

  fl_chart: ^1.2.0
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter

  form_builder_validators: ^11.3.0
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  http_cache_hive_store: ^5.1.0
  infinite_scroll_pagination: ^5.1.1
  json_annotation: ^4.12.0
  modal_bottom_sheet: ^3.0.0
  path_provider: ^2.1.6
  responsive_framework: ^1.5.1
  retrofit: ^4.9.2
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  storage:
    path: packages/storage
  stream_transform: ^2.1.1
  talker: ^5.1.17
  talker_bloc_logger: ^5.1.17
  talker_dio_logger: ^5.1.17
  talker_flutter: ^5.1.17
  ui_kit:
    path: packages/ui_kit
  url_launcher: ^6.3.2
  webview_guardian:
    git:
      url: https://github.com/xEncerx/webview_guardian
      ref: main
  window_manager: ^0.5.1

dev_dependencies:
  auto_route_generator: ^10.5.0
  bloc_test: ^10.0.0
  build_runner: ^2.15.0

  flutter_test:
    sdk: flutter

  freezed: ^3.2.5
  hive_ce_generator: ^1.11.1
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  retrofit_generator: ^10.2.7
  test: ^1.31.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/svgs/
    - assets/images/
    - shorebird.yaml

flutter_launcher_icons:
  image_path_android: "assets/icon/android_icon.png"
  android: true
  adaptive_icon_background: "assets/icon/android_icon_background.png"
  adaptive_icon_foreground: "assets/icon/android_icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/android_icon_monochrome.png"
  windows:
    generate: true
    image_path: "assets/icon/windows_icon.png"
    icon_size: 48
